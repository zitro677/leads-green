version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: ocr_user
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: ocr_service
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    networks:
      - ocr-network

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --requirepass devpassword
    networks:
      - ocr-network

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ocr_admin
      MINIO_ROOT_PASSWORD: devpassword123
    volumes:
      - minio_dev_data:/data
    networks:
      - ocr-network

networks:
  ocr-network:
    driver: bridge

volumes:
  postgres_dev_data:
  minio_dev_data:
