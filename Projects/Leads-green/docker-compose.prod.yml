# Production stack — Docker + Traefik
# Deploy: docker compose -f docker-compose.prod.yml up -d
# Update API: docker compose -f docker-compose.prod.yml build leads-api && docker compose -f docker-compose.prod.yml up -d --no-deps leads-api

services:

  leads-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: leads-api
    restart: unless-stopped
    env_file: .env
    environment:
      - APP_ENV=production
      - LOG_LEVEL=info
      - ALLOWED_ORIGINS=https://leadsgreen.arkanatech.tech,https://api.arkanatech.tech
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.leads-api.rule=Host(`api.arkanatech.tech`)"
      - "traefik.http.routers.leads-api.entrypoints=websecure"
      - "traefik.http.routers.leads-api.tls.certresolver=leresolver"
      - "traefik.http.services.leads-api.loadbalancer.server.port=8001"
    networks:
      - traefik_default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  leads-dashboard:
    build:
      context: .
      dockerfile: Dockerfile.dashboard
    container_name: leads-dashboard
    restart: unless-stopped
    environment:
      - API_BASE=https://api.arkanatech.tech
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.leads-dashboard.rule=Host(`leadsgreen.arkanatech.tech`)"
      - "traefik.http.routers.leads-dashboard.entrypoints=websecure"
      - "traefik.http.routers.leads-dashboard.tls.certresolver=leresolver"
      - "traefik.http.services.leads-dashboard.loadbalancer.server.port=80"
    networks:
      - traefik_default
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3

networks:
  traefik_default:
    external: true
